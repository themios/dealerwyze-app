  <title>DealerWyze — Design System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #F8F4EE; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #F8F4EE; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
  </style>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

--radius: 0.625rem;\n    --background: #F8F4EE;\n    --foreground: #0A1628;\n    --card: #FFFFFF;\n    --card-foreground: #0A1628;\n    --primary: #0D2B55;\n    --primary-foreground: #FFFFFF;\n    --secondary: #EDE8E0;\n    --secondary-foreground: #0D2B55;\n    --muted: #EDE8E0;\n    --muted-foreground: #6B6355;\n    --accent: #FEF3E2;\n    --accent-foreground: #92560A;\n    --destructive: #E03A1E;\n    --border: #DDD8CF;\n    --input: #DDD8CF;\n    --ring: #0D2B55;\n    --brand-orange: #F07018;\n    --brand-amber: #F5A623;\n    --brand-green: #2A6B1A;\n    --brand-coral: #E03A1E;\n\n    --font-display: 'Barlow Semi Condensed', system-ui, sans-serif;\n    --font-body: 'Archivo', system-ui, sans-serif;\n    --font-mono: 'Geist Mono', ui-monospace, monospace;\n  }\n\n  .dark {\n    --background: #07131F;\n    --foreground: #F0EBE3;\n    --card: #0D1F33;\n    --card-foreground: #F0EBE3;\n    --primary: #F07018;\n    --primary-foreground: #FFFFFF;\n    --secondary: #122A44;\n    --secondary-foreground: #D6CFC5;\n    --muted: #122A44;\n    --muted-foreground: #8A8070;\n    --accent: #1C3A5C;\n    --accent-foreground: #F5A623;\n    --destructive: #FF5436;\n    --border: rgba(255, 255, 255, 0.10);\n    --input: rgba(255, 255, 255, 0.12);\n    --ring: #F07018;\n    --brand-orange: #F07018;\n    --brand-amber: #F5A623;\n    --brand-green: #3D9926;\n    --brand-coral: #FF5436;\n  }\n\n  /* ---------- Page chrome (outside themed panels) ---------- */\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: var(--font-body);\n    background: #E8E2D7;\n    color: #0A1628;\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n  }\n\n  .page-header {\n    padding: 32px 40px 20px;\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    gap: 24px;\n    flex-wrap: wrap;\n  }\n  .page-title {\n    font-family: var(--font-display);\n    font-weight: 800;\n    font-size: 32px;\n  color: var(--foreground);\n    margin: 0;\n  }\n  .section-label .hint {\n    font-size: 11px;\n    font-family: var(--font-mono);\n    color: var(--muted-foreground);\n  }\n\n  /* Color swatches */\n  .color-grid {\n    display: grid;\n    grid-template-columns: repeat(2, minmax(0, 1fr));\n    gap: 8px;\n  }\n  .swatch {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    padding: 10px 12px;\n    display: flex;\n    align-items: center;\n    gap: 10px;\n  }\n  .swatch .chip {\n    width: 28px; height: 28px;\n    border-radius: 6px;\n    border: 1px solid var(--border);\n    flex: none;\n  }\n  .swatch .meta { display: flex; flex-direction: column; min-width: 0; }\n  .swatch .name {\n    font-size: 12px;\n    font-weight: 600;\n    color: var(--foreground);\n    font-family: var(--font-body);\n    white-space: nowrap;\n    overflow: hidden;\n    text-overflow: ellipsis;\n  }\n  .swatch .hex {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    color: var(--muted-foreground);\n  }\n\n  /* Type scale */\n  .type-row {\n    display: grid;\n    grid-template-columns: 120px 1fr;\n    align-items: baseline;\n    gap: 16px;\n    padding: 14px 0;\n    border-bottom: 1px dashed var(--border);\n  }\n  .type-row:last-child { border-bottom: none; }\n  .type-meta {\n    font-family: var(--font-mono);\n    font-size: 11px;\n    color: var(--muted-foreground);\n    line-height: 1.4;\n  }\n  .type-meta b { display:block; color: var(--foreground); font-weight: 500; }\n  .t-h1 { font-family: var(--font-display); font-weight: 700; font-size: 30px; line-height: 1.1; letter-spacing: -0.01em; color: var(--foreground); }\n  .t-h2 { font-family: var(--font-display); font-weight: 600; font-size: 22px; line-height: 1.15; color: var(--foreground); }\n  .t-h3 { font-family: var(--font-body); font-weight: 600; font-size: 17px; color: var(--foreground); }\n  .t-body { font-family: var(--font-body); font-weight: 400; font-size: 1 order-bottom: 1px solid var(--border);\n    background: var(--card);\n  }\n  .mobile-bar .sb-logo { width: 22px; height: 22px; font-size: 11px; }\n  .mobile-bar .title { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--foreground); }\n  .mobile-bar .right { margin-left: auto; display: flex; gap: 8px; color: var(--muted-foreground); }\n  .mobile-bar .right svg { width: 18px; height: 18px; }\n  .mobile-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }\n  .mobile-tabs {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    border-top: 1px solid var(--border);\n    background: var(--card);\n  }\n  .mobile-tab {\n    display: flex; flex-direction: column; align-items: center; gap: 3px;\n    padding: 10px 0 12px;\n    font-size: 10px; color: var(--muted-foreground);\n    font-weight: 500;\n  }\n  .mobile-tab svg { width: 20px; height: 20px; }\n  .mobile-tab.active { color: var(--accent-foreground); }\n  .mobile-tab.active svg { color: var(--accent-foreground); }\n\n  /* Toasts */\n  .toast {\n    display: flex; align-items: flex-start; gap: 10px;\n    padding: 10px 12px;\n    border-radius: var(--radius);\n    border: 1px solid;\n    font-size: 13px;\n    line-height: 1.4;\n    background: var(--card);\n  }\n  .toast svg { width: 16px; height: 16px; flex: none; margin-top: 1px; }\n  .toast .t-title { font-weight: 600; color: var(--foreground); }\n  .toast .t-body { color: var(--muted-foreground); font-size: 12px; margin-top: 2px; }\n  .toast.success { background: color-mix(in oklab, var(--brand-green) 10%, var(--card)); border-color: color-mix(in oklab, var(--brand-green) 35%, var(--card)); }\n  .toast.success svg { color: var(--brand-green); }\n  .toast.error { background: color-mix(in oklab, var(--destructive) 10%, var(--card)); border-color: color-mix(in oklab, var(--destructive) 35%, var(--card)); }\n  .toast.error svg { color: var(--destructive); }\n  .toast.warning { background: color-mix(in okl class=\"t-body\">Route assigned to you based on your hours.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n<\u002Fmain>\n\n<footer class=\"footer-band\">\n  <span>DealerWyze · Design System v0.1<\u002Fspan>\n  <span>Barlow Semi Condensed · Archivo · Geist Mono<\u002Fspan>\n<\u002Ffooter>\n\n<script>\n  // ---- Color tokens data ----\n  const LIGHT_TOKENS = [\n    ['--background','#F8F4EE','Page background'],\n    ['--foreground','#0A1628','Body text'],\n    ['--card','#FFFFFF','Card surface'],\n    ['--primary','#0D2B55','Primary action'],\n    ['--secondary','#EDE8E0','Secondary surface'],\n    ['--muted','#EDE8E0','Muted surface'],\n    ['--muted-foreground','#6B6355','Metadata text'],\n    ['--accent','#FEF3E2','Accent surface'],\n    ['--accent-foreground','#92560A','Accent text'],\n    ['--destructive','#E03A1E','Destructive'],\n    ['--border','#DDD8CF','Borders'],\n    ['--ring','#0D2B55','Focus ring'],\n    ['--brand-orange','#F07018','Brand orange'],\n    ['--brand-amber','#F5A623','Brand amber'],\n    ['--brand-green','#2A6B1A','Brand green'],\n    ['--brand-coral','#E03A1E','Brand coral'],\n  ];\n  const DARK_TOKENS = [\n    ['--background','#07131F','Page background'],\n    ['--foreground','#F0EBE3','Body text'],\n    ['--card','#0D1F33','Card surface'],\n    ['--primary','#F07018','Primary action'],\n    ['--secondary','#122A44','Secondary surface'],\n    ['--muted','#122A44','Muted surface'],\n    ['--muted-foreground','#8A8070','Metadata text'],\n    ['--accent','#1C3A5C','Accent surface'],\n    ['--accent-foreground','#F5A623','Accent text'],\n    ['--destructive','#FF5436','Destructive'],\n    ['--border','rgba(255,255,255,.10)','Borders'],\n    ['--ring','#F07018','Focus ring'],\n    ['--brand-orange','#F07018','Brand orange'],\n    ['--brand-amber','#F5A623','Brand amber'],\n    ['--brand-green','#3D9926','Brand green'],\n    ['--brand-coral','#FF5436','Brand coral'],\n  ];\n\n  function renderSwatches(container, tokens) {\n    container.innerHTML = tokens.map(([name, hex, role]) => `\n      <div class=\"swatch\">\n        <span class=\"chip\" style=\"background:${hex}\"><\u002Fspan>\n        <div class=\"meta\">\n          <span class=\"name\">${name}<\u002Fspan>\n          <span class=\"hex\">${hex}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `).join('');\n  }\n  renderSwatches(document.querySelector('[data-theme=\"light\"]'), LIGHT_TOKENS);\n  renderSwatches(document.querySelector('[data-theme=\"dark\"]'), DARK_TOKENS);\n\n  // ---- Type scale (same markup for both panels) ----\n  const TYPE_ROWS = [\n    ['h1 · Display 30/32','Barlow SC 700','<span class=\"t-h1\">Today’s queue<\u002Fspan>'],\n    ['h2 · 22','Barlow SC 600','<span class=\"t-h2\">12 leads waiting<\u002Fspan>'],\n    ['h3 · 17','Archivo 600','<span class=\"t-h3\">Customer details<\u002Fspan>'],\n    ['Body · 15','Archivo 400','<span class=\"t-body\">Stopped by to see the Silverado. Coming back Saturday with spouse.<\u002Fspan>'],\n    ['Label · 12','Archivo 500','<span class=\"t-label\">Phone number<\u002Fspan>'],\n    ['Badge · 11','Archivo 600 UC','<span class=\"t-badge\">New lead<\u002Fspan>'],\n    ['Mono · 13','Geist Mono 400','<span class=\"t-mono\">VIN 1HGCM82633A004352<\u002Fspan>'],\n  ];\n  document.querySelectorAll('.type-stack').forEach(el => {\n    el.innerHTML = TYPE_ROWS.map(([tag, sub, html]) => `\n      <div class=\"type-row\">\n        <div class=\"type-meta\"><b>${tag}<\u002Fb>${sub}<\u002Fdiv>\n        <div>${html}<\u002Fdiv>\n      <\u002Fdiv>\n    `).join('');\n  });\n\n  // Render Lucide icons\n  if (window.lucide) lucide.createIcons();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
